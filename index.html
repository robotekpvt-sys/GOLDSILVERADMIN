<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚙️ Admin Panel - GoldSilver</title>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #f3f4f6;
            padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        .header h1 { font-size: 22px; color: #fbbf24; }
        .header .badge { background: rgba(52, 211, 153, 0.1); color: #34d399; padding: 4px 12px; border-radius: 20px; font-size: 10px; }
        
        .card {
            background: #111827;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .card h3 {
            color: #fbbf24;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card h3 .count {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .stat-box {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-box .number { font-size: 22px; font-weight: 700; color: #fbbf24; }
        .stat-box .label { font-size: 10px; color: #9ca3af; margin-top: 2px; }
        
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            background: transparent;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: #fbbf24;
            color: #1a1200;
            border-color: #fbbf24;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .list-item .info .name { font-size: 13px; font-weight: 600; }
        .list-item .info .detail { font-size: 11px; color: #9ca3af; }
        .list-item .info .small { font-size: 10px; color: #6b7c96; }
        .list-item .actions { display: flex; gap: 4px; flex-wrap: wrap; }
        
        .list-item .actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .list-item .actions button:active { transform: scale(0.95); }
        .list-item .actions .approve { background: #34d399; color: #000; }
        .list-item .actions .reject { background: #f87171; color: #fff; }
        .list-item .actions .gold { background: #fbbf24; color: #000; }
        .list-item .actions .silver { background: #d1d5db; color: #000; }
        .list-item .actions .ban { background: #ef4444; color: #fff; }
        .list-item .actions .unban { background: #34d399; color: #000; }
        .list-item .actions .edit { background: #60a5fa; color: #000; }
        
        .list-item .status {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        .list-item .status.active { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        .list-item .status.banned { background: rgba(248, 113, 113, 0.15); color: #f87171; }
        .list-item .status.pending { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .list-item .status.completed { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        
        .empty, .loading { text-align: center; color: #9ca3af; padding: 20px; font-size: 13px; }
        
        .upi-display {
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.08);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 16px;
            color: #fbbf24;
            margin-bottom: 10px;
        }
        .upi-input-group { display: flex; gap: 8px; }
        .upi-input-group input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .upi-input-group input:focus { border-color: #fbbf24; }
        .upi-input-group button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #fbbf24;
            color: #1a1200;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-logout {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #f87171;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .login-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-container .logo { text-align: center; margin-bottom: 30px; }
        .login-container .logo h1 { font-size: 28px; color: #fbbf24; }
        .login-container .logo p { color: #9ca3af; font-size: 13px; }
        .login-container input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }
        .login-container input:focus { border-color: #fbbf24; }
        .login-container .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #fbbf24;
            color: #1a1200;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }
        .login-container .error { color: #f87171; text-align: center; font-size: 13px; margin-top: 8px; }
        
        .bet-choice {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
        }
        .bet-choice.gold { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .bet-choice.silver { background: rgba(209, 213, 219, 0.2); color: #d1d5db; }
        
        .scrollable { max-height: 400px; overflow-y: auto; }
        .scrollable::-webkit-scrollbar { width: 3px; }
        .scrollable::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #111827;
            border-radius: 16px;
            padding: 24px;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .modal-content h3 { color: #fbbf24; margin-bottom: 12px; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal-actions .save { background: #fbbf24; color: #1a1200; }
        .modal-actions .cancel { background: rgba(255,255,255,0.05); color: #9ca3af; }
    </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="login-container">
    <div class="logo">
        <h1>⚙️ Admin Panel</h1>
        <p>GoldSilver Management</p>
    </div>
    <input type="email" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Password">
    <button class="login-btn" onclick="adminLogin()">🔐 Login</button>
    <div class="error" id="loginError"></div>
</div>

<!-- ===== DASHBOARD SCREEN ===== -->
<div id="dashboardScreen" style="display:none;">
    <div class="container">
        <div class="header">
            <h1>⚙️ Admin Panel</h1>
            <span class="badge">● Live</span>
        </div>
        
        <!-- Stats -->
        <div class="card">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="number" id="statUsers">0</div>
                    <div class="label">👥 Users</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="statBets">0</div>
                    <div class="label">🎯 Bets</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="statPending">0</div>
                    <div class="label">⏳ Pending</div>
                </div>
            </div>
        </div>
        
        <!-- UPI -->
        <div class="card">
            <h3>📱 UPI Settings</h3>
            <div class="upi-display" id="currentUpi">Loading...</div>
            <div class="upi-input-group">
                <input type="text" id="upiInput" placeholder="New UPI ID (e.g., business@paytm)">
                <button onclick="updateUPI()">Update</button>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')">👥 Users</button>
            <button class="tab-btn" onclick="switchTab('bets')">🎯 Bets</button>
            <button class="tab-btn" onclick="switchTab('deposits')">💰 Deposits</button>
            <button class="tab-btn" onclick="switchTab('withdraws')">💸 Withdraws</button>
        </div>
        
        <!-- Users Tab -->
        <div id="usersTab" class="tab-content active">
            <div class="card">
                <h3>👥 All Users <span class="count" id="userCount">0</span></h3>
                <div class="scrollable" id="userList">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>
        
        <!-- Bets Tab -->
        <div id="betsTab" class="tab-content">
            <div class="card">
                <h3>🎯 Live Bets <span class="count" id="betCount">0</span></h3>
                <div class="scrollable" id="betList">
                    <div class="loading">Loading bets...</div>
                </div>
            </div>
        </div>
        
        <!-- Deposits Tab -->
        <div id="depositsTab" class="tab-content">
            <div class="card">
                <h3>💰 Pending Deposits <span class="count" id="depositCount">0</span></h3>
                <div class="scrollable" id="depositList">
                    <div class="loading">Loading deposits...</div>
                </div>
            </div>
        </div>
        
        <!-- Withdraws Tab -->
        <div id="withdrawsTab" class="tab-content">
            <div class="card">
                <h3>💸 Pending Withdrawals <span class="count" id="withdrawCount">0</span></h3>
                <div class="scrollable" id="withdrawList">
                    <div class="loading">Loading withdrawals...</div>
                </div>
            </div>
        </div>
        
        <button class="btn-logout" onclick="logoutAdmin()">🚪 Logout</button>
    </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <h3 id="modalTitle">Action</h3>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="cancel" onclick="closeModal()">Cancel</button>
            <button class="save" id="modalSaveBtn" onclick="modalSave()">Save</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyCYtL-DqPjiUdQn6s8Mp49CEQLVqNh_aaY",
    authDomain: "silvergold-dbe2f.firebaseapp.com",
    databaseURL: "https://silvergold-dbe2f-default-rtdb.firebaseio.com",
    projectId: "silvergold-dbe2f",
    storageBucket: "silvergold-dbe2f.firebasestorage.app",
    messagingSenderId: "14714045042",
    appId: "1:14714045042:web:e1d95d8fdaff21606378eb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

// ============================================================
// STATE & UNSUB LISTENERS
// ============================================================
let modalCallback = null;
let currentUpi = 'pay.silvergold@ybl';
let usersUnsubscribe = null;
let betsUnsubscribe = null;
let depositsUnsubscribe = null;
let withdrawsUnsubscribe = null;

// ऑटो लॉग-इन चेक
auth.onAuthStateChanged(user => {
    if (user) {
        db.collection('users').doc(user.uid).get().then(snap => {
            if (snap.exists && snap.data().role === 'admin') {
                showDashboard();
            } else {
                auth.signOut();
            }
        }).catch(() => auth.signOut());
    } else {
        showLogin();
    }
});

function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    loadAllData();
}

function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardScreen').style.display = 'none';
    stopAllListeners();
}

function stopAllListeners() {
    if (usersUnsubscribe) usersUnsubscribe();
    if (betsUnsubscribe) betsUnsubscribe();
    if (depositsUnsubscribe) depositsUnsubscribe();
    if (withdrawsUnsubscribe) withdrawsUnsubscribe();
}

// ============================================================
// ADMIN LOGIN
// ============================================================
function adminLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorEl = document.getElementById('loginError');
    
    if (!email || !password) {
        errorEl.textContent = 'Please enter email and password';
        return;
    }
    
    errorEl.textContent = '⏳ Logging in...';
    
    auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
            return db.collection('users').doc(userCredential.user.uid).get();
        })
        .then(snap => {
            if (snap.exists && snap.data().role === 'admin') {
                errorEl.textContent = '';
                showDashboard();
            } else {
                errorEl.textContent = '⛔ You are not authorized as admin';
                auth.signOut();
            }
        })
        .catch(err => {
            errorEl.textContent = '❌ ' + err.message;
        });
}

// ============================================================
// LOAD REALTIME DATA
// ============================================================
function loadAllData() {
    // UPI Sync
    rtdb.ref('system/config/merchantUpi').on('value', snap => {
        currentUpi = snap.val() || 'pay.silvergold@ybl';
        document.getElementById('currentUpi').textContent = currentUpi;
    });
    
    // 1. USERS LIST (Firestore)
    if (usersUnsubscribe) usersUnsubscribe();
    usersUnsubscribe = db.collection('users').onSnapshot(snapshot => {
        const container = document.getElementById('userList');
        const count = snapshot.size;
        
        document.getElementById('statUsers').textContent = count;
        document.getElementById('userCount').textContent = count;
        
        if (snapshot.empty) {
            container.innerHTML = '<div class="empty">❌ No users found in Firestore</div>';
            return;
        }
        
        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.role === 'admin') return; // एडमिन को लिस्ट में न दिखाएं
            
            const isBanned = data.isBanned || false;
            const balance = data.balance || 0;
            const bets = data.totalBets || 0;
            
            html += `
                <div class="list-item">
                    <div class="info">
                        <div class="name">👤 ${data.name || 'User'}</div>
                        <div class="detail">${data.email}</div>
                        <div class="small">💰 ₹${balance} • Bets: ${bets}</div>
                    </div>
                    <div class="actions">
                        <span class="status ${isBanned ? 'banned' : 'active'}">${isBanned ? '🚫' : '✅'}</span>
                        <button class="edit" onclick="editBalance('${doc.id}')">💰</button>
                        ${isBanned ? 
                            `<button class="unban" onclick="toggleBan('${doc.id}', false)">🔓</button>` :
                            `<button class="ban" onclick="toggleBan('${doc.id}', true)">🔒</button>`
                        }
                    </div>
                </div>
            `;
        });
        container.innerHTML = html || '<div class="empty">No standard users found.</div>';
    }, err => console.error("Firestore Error:", err));
    
    // 2. BETS LIST (Realtime Database)
    if (betsUnsubscribe) betsUnsubscribe();
    betsUnsubscribe = rtdb.ref('bets').on('value', snapshot => {
        const container = document.getElementById('betList');
        const countEl = document.getElementById('betCount');
        
        if (!snapshot.exists()) {
            container.innerHTML = '<div class="empty">No bets found</div>';
            countEl.textContent = '0';
            document.getElementById('statBets').textContent = '0';
            return;
        }
        
        let bets = [];
        snapshot.forEach(child => {
            bets.push({ id: child.key, ...child.val() });
        });
        
        bets.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
        
        countEl.textContent = bets.length;
        document.getElementById('statBets').textContent = bets.filter(b => b.status === 'ACTIVE').length;
        
        let html = '';
        bets.forEach(bet => {
            const time = new Date(bet.timestamp).toLocaleString('en-IN');
            const choice = bet.choice || 'N/A';
            const isGold = choice === 'Gold';
            const status = bet.status || 'UNKNOWN';
            const isActive = status === 'ACTIVE';
            
            html += `
                <div class="list-item">
                    <div class="info">
                        <div class="name">👤 ${bet.username || bet.email || 'User'}</div>
                        <div class="detail">₹${bet.betAmount} • <span class="bet-choice ${isGold ? 'gold' : 'silver'}">${choice}</span></div>
                        <div class="small">${time} • Status: ${status}</div>
                    </div>
                    <div class="actions">
                        ${isActive ? `
                            <button class="gold" onclick="forceOutcome('${bet.id}', 'Gold')">🟡 Gold</button>
                            <button class="silver" onclick="forceOutcome('${bet.id}', 'Silver')">⚪ Silver</button>
                        ` : `
                            <span class="status completed">✅ Done</span>
                            ${bet.outcome ? `<span class="bet-choice ${bet.outcome === 'Gold' ? 'gold' : 'silver'}">${bet.outcome} Won</span>` : ''}
                        `}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    });
    
    // 3. DEPOSITS (Firestore)
    if (depositsUnsubscribe) depositsUnsubscribe();
    depositsUnsubscribe = db.collection('transactions')
        .where('type', '==', 'DEPOSIT')
        .where('status', '==', 'pending')
        .onSnapshot(snapshot => {
            const container = document.getElementById('depositList');
            const count = snapshot.size;
            
            document.getElementById('depositCount').textContent = count;
            document.getElementById('statPending').textContent = count;
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="empty">No pending deposits</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = new Date(data.timestamp).toLocaleString('en-IN');
                html += `
                    <div class="list-item">
                        <div class="info">
                            <div class="name">💰 ₹${data.amount}</div>
                            <div class="detail">${data.email}</div>
                            <div class="small">${date} • UTR: ${data.utr || 'N/A'}</div>
                        </div>
                        <div class="actions">
                            <button class="approve" onclick="approveDeposit('${doc.id}')">✅ Approve</button>
                            <button class="reject" onclick="rejectDeposit('${doc.id}')">❌ Reject</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    
    // 4. WITHDRAWS (Firestore)
    if (withdrawsUnsubscribe) withdrawsUnsubscribe();
    withdrawsUnsubscribe = db.collection('transactions')
        .where('type', '==', 'WITHDRAW')
        .where('status', '==', 'pending')
        .onSnapshot(snapshot => {
            const container = document.getElementById('withdrawList');
            const count = snapshot.size;
            
            document.getElementById('withdrawCount').textContent = count;
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="empty">No pending withdrawals</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = new Date(data.timestamp).toLocaleString('en-IN');
                html += `
                    <div class="list-item">
                        <div class="info">
                            <div class="name">💸 ₹${data.amount}</div>
                            <div class="detail">${data.email}</div>
                            <div class="small">${date} • UPI: ${data.upiId || 'N/A'}</div>
                        </div>
                        <div class="actions">
                            <button class="approve" onclick="approveWithdraw('${doc.id}')">✅ Approve</button>
                            <button class="reject" onclick="rejectWithdraw('${doc.id}')">❌ Reject</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
}

// ============================================================
// CORE ACTIONS
// ============================================================
function forceOutcome(betId, outcome) {
    if (!confirm(`Force "${outcome}" as winner for this bet?`)) return;
    
    rtdb.ref('bets/' + betId).update({
        status: 'COMPLETED',
        outcome: outcome,
        forcedBy: 'admin',
        resolvedAt: Date.now()
    }).then(() => {
        alert('✅ ' + outcome + ' forced successfully!');
    }).catch(err => alert('❌ Error: ' + err.message));
}

function approveDeposit(docId) {
    if (!confirm('Approve this deposit? (Balance will be credited)')) return;
    
    db.collection('transactions').doc(docId).get().then(snap => {
        const data = snap.data();
        if (data && data.userId && data.amount) {
            const batch = db.batch();
            const userRef = db.collection('users').doc(data.userId);
            const txRef = db.collection('transactions').doc(docId);
            
            batch.update(userRef, { balance: firebase.firestore.FieldValue.increment(data.amount) });
            batch.update(txRef, { status: 'approved', processedAt: Date.now() });
            
            return batch.commit();
        }
        throw new Error("Invalid transaction data");
    }).then(() => {
        alert('✅ Deposit approved! Balance credited.');
    }).catch(err => alert('❌ Error: ' + err.message));
}

function rejectDeposit(docId) {
    if (!confirm('Reject this deposit?')) return;
    db.collection('transactions').doc(docId).update({
        status: 'rejected',
        processedAt: Date.now()
    }).then(() => {
        alert('❌ Deposit rejected.');
    }).catch(err => alert('❌ Error: ' + err.message));
}

function approveWithdraw(docId) {
    if (!confirm('Approve this withdrawal?')) return;
    db.collection('transactions').doc(docId).update({
        status: 'approved',
        processedAt: Date.now()
    }).then(() => {
        alert('✅ Withdrawal approved!');
    }).catch(err => alert('❌ Error: ' + err.message));
}

function rejectWithdraw(docId) {
    if (!confirm('Reject this withdrawal? Balance will be refunded.')) return;
    
    db.collection('transactions').doc(docId).get().then(snap => {
        const data = snap.data();
        if (data && data.userId && data.amount) {
            const batch = db.batch();
            const userRef = db.collection('users').doc(data.userId);
            const txRef = db.collection('transactions').doc(docId);
            
            batch.update(userRef, { balance: firebase.firestore.FieldValue.increment(data.amount) });
            batch.update(txRef, { status: 'rejected', processedAt: Date.now() });
            
            return batch.commit();
        }
        throw new Error("Invalid transaction data");
    }).then(() => {
        alert('❌ Withdrawal rejected. Balance refunded.');
    }).catch(err => alert('❌ Error: ' + err.message));
}

function editBalance(userId) {
    showModal('💰 Edit Balance', `
        <input type="number" id="balanceInput" placeholder="New Balance Amount" step="1">
        <p style="font-size:11px; color:#9ca3af;">Enter new balance amount (will replace current)</p>
    `, () => {
        const amount = parseFloat(document.getElementById('balanceInput').value);
        if (isNaN(amount) || amount < 0) {
            alert('Please enter a valid positive number');
            return;
        }
        db.collection('users').doc(userId).update({ balance: amount })
            .then(() => { 
                alert('✅ Balance updated to ₹' + amount); 
                closeModal(); 
            })
            .catch(err => alert('❌ Error: ' + err.message));
    });
}

function toggleBan(userId, ban) {
    if (!confirm(`${ban ? '🚫 Ban' : '🔓 Unban'} this user?`)) return;
    
    db.collection('users').doc(userId).update({ isBanned: ban })
        .then(() => alert(`✅ User ${ban ? 'banned' : 'unbanned'} successfully`))
        .catch(err => alert('❌ Error: ' + err.message));
}

function updateUPI() {
    const newUpi = document.getElementById('upiInput').value.trim();
    if (!newUpi || !newUpi.includes('@')) {
        alert('Please enter a valid UPI ID');
        return;
    }
    if (!confirm(`Change UPI from "${currentUpi}" to "${newUpi}"?`)) return;
    
    rtdb.ref('system/config/merchantUpi').set(newUpi)
        .then(() => {
            alert('✅ UPI updated successfully!');
            document.getElementById('upiInput').value = '';
        })
        .catch(err => alert('❌ Error: ' + err.message));
}

// ============================================================
// UI WINDOWS & UTILS
// ============================================================
function showModal(title, bodyHtml, callback) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modalOverlay').classList.add('show');
    modalCallback = callback;
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    modalCallback = null;
}

function modalSave() {
    if (modalCallback) modalCallback();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    const tabs = ['users', 'bets', 'deposits', 'withdraws'];
    const idx = tabs.indexOf(tab);
    if (idx !== -1) {
        document.querySelectorAll('.tab-btn')[idx].classList.add('active');
        document.getElementById(tab + 'Tab').classList.add('active');
    }
}

function logoutAdmin() {
    if (confirm('Are you sure you want to logout?')) {
        auth.signOut();
    }
}
